services:
  # Backend API Service (מגיש גם את ה-Frontend)
  - type: web
    name: team-tasks-api
    env: node
    runtime: node
    rootDir: WolfTasksServer
    plan: free
    buildCommand: 'cd ../team-tasks && npm install && npm run build --configuration production && cd ../WolfTasksServer && npm ci --omit=dev && npm_config_build_from_source=1 npm rebuild better-sqlite3'
    startCommand: 'if [ "${SEED}" = "true" ]; then node seed.js; fi; node server.js'
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DB_FILE
        value: /tmp/data.sqlite
      - key: SEED
        value: 'false'